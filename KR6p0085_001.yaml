body:
  text: 戀西釋子古崑録集慈雲懺主印施彌陀經正信發願偈稽首十方佛彌陀聖中尊方等修多羅一切法寶藏觀音及勢至大地菩薩僧我以誠信心刻板并印造阿彌陀經卷及以正信偈旋造各一萬施四衆受持偈以發信心經以資讀誦若有每日中至少誦三卷年誦千八十十年萬八百況復多誦者及歷多年數如是積功德自然生佛前我此萬卷經隨所流布處極少得一人誦持生淨土我願承此力決定生彼國況復於多人人亡經復在展轉相傳授是名無盡燈燈燈相照耀破生死長夜顯出佛菩提空竟悉同生常寂光淨土持此清淨福回向奉君親我國聖帝王及聖后聖位仁壽各萬年覆育羣泯類我父母眷屬怨親非怨親咸承勝善根同生安養國要解云信願持名一行不涉施為圓轉五濁唯信及入非思議所行境界設非本師來入惡世示得菩提以大智大悲見此行此説此衆生何由稟此也哉是故持名行者凡誦經時當先稱南無本師釋迦牟尼佛三聲佛説阿彌陀經姚秦三藏法師鳩摩羅什譯如是我聞一時佛在舍衛國祇樹給孤獨國至歡喜信受作禮而去經終誦往生呪三遍回向云願以此功德莊嚴佛淨土上報四重恩下濟三途苦若有見聞者悉發菩提心盡此一報身同生極樂國佛云多有菩薩欲聞此經而不能得若有衆生聞此經者於無上道終不退轉是故應當專心信受持誦説行無得以我滅度之後復生疑惑當來之世經道滅盡我以慈悲哀愍特留此經止住百歲其有衆生值斯經者隨意所願皆可得度出大本昔梁朝有道珍法師當於廬山念佛作水觀忽夢江水瀰滿衆人乘船言往西方珍言道珍一生修西方業可附我而去船上人云法師雖講經甚大未誦彌陀經并往生呪淨業未圓不得往也慈雲云此經文句雖約與大本意同上聖赴緣廣略異耳依正主伴於是備焉願行方軌有加諸説辭簡義博諷易功多良在茲矣請先熟尋節段然後誦文則起盡有倫功不虗棄如或清晨淨夜收視聽以端居口誦心遊蕩神明於幽極氛纍斯滌淨境弗迷廣舌勸持豈不然也往生淨土十念法門天竺慈雲大師述十念門者每晨服飾已面西正立合掌連聲稱阿彌陀佛盡一氣為一念如是十氣為十念隨氣長短不限佛數氣極為度聲不高低不緩急調停得中十氣連屬令心不散專精為功名十念者是籍氣束心也作此念已發願回向云我弟子某甲一心歸命極樂世界阿彌陀佛願以淨光照我慈誓攝我我今正念稱如來名經十念頃為菩提道求生淨土佛昔本誓若有衆生欲生我國至心信樂乃至十念若不生者不取正覺唯除五逆誹謗正法我今自憶此生已來不造逆罪不謗大乘願此十念得入如來大誓海中乘佛慈力衆罪消滅淨因增長若臨欲命終自知時至身不病苦心無貪戀心不倒散如入禪定佛及聖衆手執金臺來迎接我如一念頃生極樂國華開見佛即聞佛乘頓開佛慧廣度衆生滿菩提願佛説阿彌陀經禮想儀觀文全刻以便初學倒觀者順佛法僧三寶為次第故戀西釋子古崑遵古略輯時公以小本彌陀字字是行人真歸字字是行人妙觀歸觀會一即是行經遂輯受持行儀自作往生左券余深喜之因隨好略是故遵此復輯禮想儀焉行者凡禮想時先跪佛前燒香合掌云願此香煙雲遍滿十方界供養一切佛世間難信法及諸上善人普熏諸衆生皆發菩提心即起禮佛一心頂禮娑婆世界五濁惡世説難信法本師釋迦牟尼佛拜下想經云舍利弗如我今稱者讚諸佛不可思議功德彼諸佛等亦稱讚我不可思議功德而作是言釋迦牟尼佛能為甚難希有之事能於娑婆國土五濁惡世却濁見濁煩惱濁衆生濁命濁中得阿耨多羅三藐三菩提為諸衆生説是一切世間難信之法舍利弗當知我於五濁惡世行此難事得阿耨多羅三藐三菩提為一切世間説此難信之法是為甚難一心頂禮十方世界出廣長舌勸讚西方恆河沙數諸佛拜下想經云舍利弗如我今者讚歎阿彌陀佛不可思議功德之利東方亦有阿閦鞞佛須彌相佛大須彌佛須彌光佛妙音佛如是等恆河沙數諸佛各於其國出廣長舌相遍覆三千大千世界説誠實言汝等衆生當信是稱讚不可思議功德一切諸佛所護念經舍利弗南方世界有日月燈佛名聞光佛大焰肩佛須彌燈佛無量精進佛如是等恆河沙數諸佛各於其國出廣長舌相遍覆三千大千世界説誠實言汝等衆生當信是稱讚不可思議功德一切諸佛所護念經舍利弗西方世界有無量壽佛無量相佛無量幢佛大光佛大明佛寶相佛淨光佛如是等恆河沙數諸佛各於其國出廣長舌相遍覆三千大千世界説誠實言汝等衆生當信是稱讚不可思議功德一切諸佛所護念經舍利弗北方世界有焰肩佛最勝音佛難沮佛日生佛綱明佛如是等恆河沙數諸佛各於其國出廣長舌相遍覆三千大千世界説誠實言汝等衆生當信是稱讚不可思議功德一切諸佛所護念經舍利弗下方世界有師子佛名聞佛名光佛達摩佛法幢佛持法佛如是等恆河沙數諸佛各於其國出廣長舌相遍覆三千大千世界説誠實言汝等衆生當信是稱讚不可思議功德一切諸佛所護念經舍利弗上方世界有梵音佛宿王佛香上佛香光佛大焰肩佛雜色寶華嚴身佛娑羅樹王佛寶華德佛見一切義佛如須彌山佛如是等恆河沙數諸佛各於其國出廣長舌相遍覆三千大千世界説誠實言汝等衆生當信是稱讚不可思議功德一切諸佛所護念經一心頂禮西方極樂世界光壽無量普攝羣生阿彌陀佛拜下想經云舍利弗於汝意云何彼佛我故號阿彌陀舍利弗彼佛光明無量照十方國無所障礙是故號為阿彌陀又舍利弗彼佛壽命及其人民無量無邊呵僧祇劫故名阿彌陀舍利弗阿彌陀佛成佛以來於今十劫一心頂禮西方極樂世界執持名號臨終導引阿彌陀佛拜下想經云舍利弗不可以少善根福德因緣得生彼國舍利弗若有善男子善女人聞説阿彌陀佛執持名號若一日若二日若三日若四日若五日若六日若七日一心不亂其人臨命終時阿彌陀佛與諸聖衆現在其前是人終時心不顛倒即得往生阿彌陀佛極樂國土舍利弗我見是利故説此言若有衆生聞是説者應當發願生彼國土一心頂禮西方極樂世界已今當願皆令往生阿彌陀佛拜下想經云舍利弗若有人已發願今發願當發願欲生阿彌陀佛國者是諸人等皆得不退轉於阿耨多羅三藐三菩提於彼國土若已生若今生若當生是故舍利弗諸善男子善女人若有信者應當發願生彼國土一心頂禮稱讚不可思議功德一切諸佛所護念經及十方三世一切尊法拜下想經云舍利弗於汝意云何何故名為一切諸佛所護念經舍利弗若有善男子善女人聞是經受持者及聞諸佛名者是諸善男字善女人皆為一切諸佛之所護念皆得不退轉於阿耨多羅三藐三菩提是故舍利弗汝等皆當信受我語及諸佛所説一心頂禮西方極樂世界觀音勢至諸上善人及清淨大海衆菩薩摩訶薩拜下想經云又舍利弗彼佛有無量無邊聲聞弟子皆阿羅漢非是算數之所能知諸菩薩衆亦復如是舍利弗彼佛國土成就如是功德莊嚴又舍利弗極樂國土衆生生者皆是阿鞞跋致其中多有一生補處其數甚多非是算數所能知之但可以無量無邊阿僧祇説舍利弗衆生聞者應當發願願生彼國所以者何得與如是諸上善人俱會一處一心頂禮西方極樂世界靈鳥樹下聞音正念諸菩薩摩訶薩拜下想經云復次舍利弗彼國常有種種奇妙雜色之鳥白鶴孔雀鸚鵡舍利迦陵頻伽共命之鳥是諸衆鳥晝夜六時出和雅音其音演暢五根五力七菩提分八聖道分如是等法其土衆生聞是音已皆悉念佛念法念僧舍利弗汝勿謂此鳥實是罪報所生所以者何彼佛國土無三惡道舍利弗其佛國土尚無惡道之名何況有實是諸衆鳥皆是阿彌陀佛欲令法音宣流變化所作舍利弗彼佛國土微風吹動諸寶所樹及寶羅網出微妙音譬如百千種樂同時俱作聞是音者自然皆生念佛念法念僧之心舍利弗其佛國土成就如是功德莊嚴一心頂禮西方極樂世界黃金地上盛華供佛諸菩薩摩訶薩拜下想經云又舍利弗彼佛國土常作天樂黃金為地晝夜六時雨天曼陀羅華其土衆生常以清旦各以衣裓盛衆妙華供養他方十萬億佛即以食時還到本國飯食經行舍利弗極樂國土成就如是功德莊嚴一心頂禮西方極樂世界蓮華池內寶樓閣中諸菩薩摩訶薩拜下想經云又舍利弗極樂國土有七寶池八功德水充滿其中池底純以金沙布地四邊階道金銀琉璃玻璃合成上有樓閣亦以金銀琉璃玻璃硨磲赤珠瑪瑙而嚴飾之池中蓮華大如車輪青色青光黃色黃光赤色赤光白色白光微妙香潔舍利弗極樂國土成就如是功德莊嚴一心頂禮西方極樂世界無有衆苦但受諸樂一切菩薩摩訶薩拜下想經云爾時佛告長老舍利弗從是西方過十萬億佛土有世界名曰極樂其土有佛號阿彌陀今現在説法舍利弗彼土何故名為極樂其國衆生無有衆苦但受諸樂故名極樂又舍利弗極樂國土七重欄楯七重羅網七重行樹皆是四寶周匝圍繞是故彼國名為極樂一心頂禮文殊彌勒諸大菩薩舍利弗等諸大尊者及十方三世一切聖衆拜下想經云如是我聞一時佛在舍衛國祇樹給孤獨園與大比丘僧千二百五十人俱皆是大阿羅漢衆所知識長老舍利弗摩訶目揵連摩訶迦葉摩訶迦旃延摩訶俱絺羅離婆多周利槃陀伽難陀阿難陀羅睺羅憍梵波提賓頭盧頗羅墮迦留陀夷摩訶劫賓那薄拘羅阿䨲樓馱如是等諸大弟子并諸菩薩摩訶薩文殊師利法王子阿逸多菩薩乾陀訶提菩薩常精進菩薩與如是等諸大菩薩及釋提桓因等無量諸天大衆俱禮想已跪誦彌陀經一卷往生呪三遍讚云阿彌陀佛身金色相好光明無等倫白毫宛轉五須彌紺目澄清四大海光中化佛無數億化菩薩衆亦無邊四十八願度衆生九品咸令登彼岸南無西方極樂世界大慈大悲阿彌陀佛稱佛多少隨力而止南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩各十稱念畢回向發願云弟子稱念阿彌陀真實功德佛名號唯願慈悲垂攝受證知懺悔及所願我昔所造諸惡業皆由無始貪瞋癡從身語意之所生一切我今皆懺悔願我臨欲命終時盡除一切諸障礙面見彼佛阿彌陀即得往生安樂剎我今所修諸善根一切皆悉盡回向普願法界諸衆生同生西方極樂國自歸依佛當願衆生體解大道發無上心自歸依法當願衆生深入經藏智慧如海自歸依僧當願衆生統理大衆一切無礙和南聖衆大懺悔文加於極樂世界大慈大悲阿彌陀佛下先讀此文然後念佛不加亦可我弟子某甲至心懺悔十方諸佛真實見知我及衆生本性清淨諸佛住處名常寂光遍在剎那及一切法而我不了妄計我人於平等法中而起分別於清淨心中而生染著以是顛倒五欲因緣生死循環經歷三界坐此相續不念出期而復於中造極惡業四重五逆及一闡提非毀大乘謗破三寶謗無諸佛斷學般若用十方僧物用佛塔物污梵行人習近惡法於破戒者更相讚護三乘道人種毀罵內種覆過失外現威儀常以五邪招納四事不淨説法非律教人因佛出家反破佛法違逆師長如法教誨恣行貪恚無慚恥心以是因緣諸惡業力命終當墮阿鼻地獄猛火熾然受無量苦千萬億劫無解脫期今始覺知生大慚愧生大怖畏十方世尊阿彌陀佛久已於我生大悲心無數劫來為度我故修菩薩道不惜身命今已得佛大悲滿足真實能為一切救護今我造惡必墮三途願起哀憐受我懺悔重罪得滅諸惡消除乃至娑婆生因永盡諸佛淨土如願往生當命終時悉無障礙我懺悔已六根三業淨無瑕纍所修善根悉亦清淨皆悉回向莊嚴淨土普與衆生同生安養願阿彌陀佛常來護持令我善根現前增進不失淨因臨命終時身心正念視聽分明面奉彌陀與諸聖衆手持華臺接引於我一剎那頃生極樂國華開見佛即聞佛乘頓開佛慧廣度衆生滿菩提願懺悔發願已歸命禮阿彌陀佛及一切三寶禮四十八願儀早晚隨便一心頂禮西方極樂世界大慈大悲大願大力接引導師阿彌陀佛第一拜默誦第一願第二拜默誦第二願乃至第四十八拜默誦第四十八願不能誦願者記數禮四十八拜亦可一心頂禮西方極樂世界觀世音菩薩摩訶薩一心頂禮西方極樂世界大勢至菩薩摩訶薩一心頂禮西方極樂世界清淨大海衆菩薩摩訶薩各三拜願以此功德莊嚴佛淨土上報四重恩下濟三途苦若有見聞者悉發菩提心盡此一報身同生極樂國臨睡入觀禮誦儀戀西釋子古崑遵古略輯行者當知觀無量壽佛經云佛告阿難及韋提希諦聽諦聽善思念之吾當為汝分別解説除苦惱法汝等憶持廣為大衆分別解説我等既感佛恩受此法門是故先當作如是禮一心頂禮娑婆世界分別解説除苦惱法本師釋迦牟尼佛拜下想偈云能禮所禮性空寂感應道交難思議我此道場如帝珠釋迦如來影現中我身影現如來前為求離苦接足禮一心頂禮西方極樂世界在池水上住寶蓮華現丈六身形真金色圓光映徹圓光中無量化佛菩薩阿彌陀佛想偈云能禮所禮性空寂感應道交難思議我此道場如帝珠阿彌陀佛影現中我身影現彌陀前為求往生接足禮一心頂禮西方極樂世界在池水上天冠立佛觀世音菩薩摩訶薩想偈改觀音菩薩影現中一心頂禮西方極樂世界在池水上肉髻寶瓶大勢至菩薩摩訶薩想偈改勢至菩薩影現中一心頂禮極樂世界上品上生讀誦修慈三心圓發諸菩薩摩訶薩拜下當想本品經文不能想經但至心向禮亦可一心頂禮極樂世界上品中生解第一義心不驚動諸菩薩摩訶薩一心頂禮極樂世界上品下生但發無上清淨道心諸菩薩摩訶薩一心頂禮極樂世界中品上生修行諸戒無衆過患諸菩薩摩訶薩一心頂禮極樂世界中品中生一日一夜持戒威儀諸菩薩摩訶薩一心頂禮極樂世界中品下生孝養父母行世仁慈諸菩薩摩訶薩一心頂禮極樂世界下品上生多惡稱佛三聖慰迎諸菩薩摩訶薩一心頂禮極樂世界下品中生毀戒聞佛火滅聖臨諸菩薩摩訶薩一心頂禮極樂世界下品下生惡逆稱佛十念得超諸菩薩摩訶薩拜想已長跪合掌誦佛説觀無量壽佛經九品觀章誦至當坐道場生諸佛家至心竭力念南無阿彌陀佛十口氣南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩各十聲至心發願云弟子某甲現是生死凡夫罪障深重輪回六道苦不可言今遇知識得聞彌陀名號本願功德一心稱念求願往生願佛慈悲不捨哀憐攝受弟子某甲不識佛身相好光明願佛示現令我得見及見觀音勢至諸菩薩衆彼世界中清淨莊嚴光明妙相等令我了了得見禮佛三拜歸寮養息佛説無量壽經四十八願曹魏康僧鎧譯佛告阿難過去久遠無失數劫世自在王佛興出於世至空中讚言決定必成無上正覺佛説觀無量壽佛經九品觀章劉宋西域三藏法師疆良耶舍譯佛告阿難及韋提希若欲至心生西方者先當觀於一丈六像至為其勝友當坐道場生諸佛家余於同治元年在佛頂山慧濟寺閲淨土十要至寶王論中知智者大師臨終令讀四十八願九品觀章想智者乃東土釋迦臨終令讀豈非至要之言因此熟讀奉為日課吾信彌陀願力九界普收全賴大師之遺教也嗣法後裔古崑敬然臂香九炷謹識佛説阿彌陀經禮想儀拜下能觀經文者當依全儀不能觀者只要依此直禮功德無異凡禮拜時先跪佛前燒香合掌云願此香煙雲遍滿十方界供養一切佛世間難信法及諸上善人普熏諸衆生皆發菩提心即起一心頂禮娑婆世界五濁惡世説難信法本師釋迦牟尼佛一心頂禮十方世界出廣長舌勸讚西方恆河沙數諸佛一心頂禮西方極樂世界光壽無量普攝羣生阿彌陀佛一心頂禮西方極樂世界執持名號臨終導引阿彌陀佛一心頂禮西方極樂世界己今當願皆令往生阿彌陀佛一心頂禮稱讚不可思議功德一切諸佛所護念經及十方三世一切尊法一心頂禮西方極樂世界觀音勢至諸上善人及清淨大海衆菩薩摩訶薩一心頂禮西方極樂世界靈鳥樹下聞音正念諸菩薩摩訶薩一心頂禮西方極樂世界黃金地上盛華供佛諸菩薩摩訶薩一心頂禮西方極樂世界蓮華池內寶樓閣中諸菩薩摩訶薩一心頂禮西方極樂世界無有衆苦但受諸樂一切菩薩摩訶薩一心頂禮文殊彌勒諸大菩薩舍利弗等諸大尊者及十方三世一切聖衆跪誦彌陀經一卷往生呪三遍讚云阿彌陀佛身金色相好光明無等倫白毫宛轉五須彌紺目澄清四大海光中化佛無數億化菩薩衆亦無邊四十八願度衆生九品咸令登彼岸南無西方極樂世界大慈大悲阿彌陀佛念佛多少隨力而止南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩各十稱念畢回向發願云弟子稱念阿彌陀真實功德佛名號唯願慈悲垂攝受證知懺悔及所願我昔所造諸惡業皆由無始貪瞋癡從身語意之所生一切我今皆懺悔願我臨欲命終時盡除一切諸障礙面見彼佛阿彌陀即得往生安樂剎我今所修諸善根一切皆悉盡回向普願法界諸衆生同生西方極樂國自歸依佛當願衆生體解大道發無上心自歸依法當願衆生深入經藏智慧如海自歸依僧當願衆生統理大衆一切無礙和南聖衆東林十八賢位次慧遠法師慧永法師慧持法師道生法師曇順法師僧睿法師曇恆法師道昺法師曇詵法師道敬法師覺明法師覺賢法師即佛陀跋陀羅尊者劉程之張野周續之張詮宗炳雷次宗慧遠法師大開蓮宗本從經教故稱獨唱之初祖名第一賢也第十二佛陀跋陀羅尊者乃遠祖闡念佛三昧後二十七年入社之友今人禮為始傳淨土之祖説是遠祖授念佛三昧之師錯之極矣詳具佛祖統紀謹將蓮宗禮祖儀開明於後以便照行朔望課畢合掌云頂禮西天東土歷代祖師天下闡宗教律諸大善知識蓮宗初祖盧山慧遠大師八月初六日往生二祖光明善導大師未考彌陀誕日當供三祖般舟承遠大師七月十九日往生四祖五會法照大師十二月初一日往生五祖臺巖少康大師十月初三日往生六祖永明智覺大師二月二十六日往生七祖昭慶省常大師正月十二日往生八祖雲棲蓮池大師七月初二日往生九祖靈峯蕅益大師正月二十一日往生十祖梵天思齊大師四月十四日往生十一祖資福徹悟大師十二月十七日往生古今蓮社諸大法師後禮如常光緒九年夏日戀西學人古崑謹識西歸行儀跋佛説彌陀經者圓中鈔云即是三德祕藏圓該一切舒之則彌綸法界一即一切卷之則攝在一經一切即一能如是了則彌陀一經充滿法界可也十方法界皆具此經可也受持之人諸佛護念其所護念不在茲乎求淨土者急須諷誦以此功德速往西方讀誦大乘無過於此十念門者彌陀立誓以導奉持可不遵乎每晨稱念面必向西楚禪師云一方土淨方方淨十念心真念念真此深得面西十念之奧旨故靈峯讚楚石即是阿彌陀正覺也為此持名人縱得一心不亂此行切不可廢此行一廢則信願不切往生難矣故要解云若無信願縱將名號持至風吹不入雨打不濕亦無得生之理二儀者運三業之至誠向西方之妙境則心佛宛然自他不隔是心作佛是心是佛之皆明矣苟能遵此則信願不深而自深焉蓮宗必讀序云名號功德自何而始乃因六八大願之所莊嚴九品悲心之所成就也是故專持名者此二經文應當熟讀堅固信願全賴於斯戀西大師以至誠心集此一書可謂契理契機盡美盡善其自序一章奇倡極談精詳貫徹非得三昧定佛冥加略引後文云彌陀因果始終不捨於我等苦惱衆生而依此持名於念念中必能圓具信願行之三種資糧誠哉此語未得淨宗之骨髓必難如是余初一讀便如得寶越讀越深愈思愈妙深慚垢重何幸聞斯獲益良多感恩不盡乃覺從前持名全無信願只是壓捺妄想而已所以每每改換題目別求深妙故堅密大師云未階淨信淨願十方三世佛祖大道如何荷擔唯願修淨業者竭力遵此行儀則信願必堅西歸必穩見佛非難度生亦廣同治甲戌年夏日學人芳慧敬然臂香四十八炷供養淨土法門稽首謹識學者維遐敬刻臂香三炷供佛發願云願以此功德速往極樂國面見阿彌陀廣度於一切
