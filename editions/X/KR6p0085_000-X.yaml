body:
  text: 西歸行儀序西歸行儀本戀西學人自行之佛事因閱妙宗圓中二鈔及淨土十要等書始知彌陀經十念門二經行儀四十八願九品觀章皆淨土必要深信切願莫不由斯是故將此奉為日課并告同心共作往生左券彌陀經者乃諸佛之心要樂之家書功德不可思議故聞是經受持者皆為一切諸佛之所護念臨命終時彌陀聖眾現前導引況多佛勸持那堪不誦十念法門本彌陀大願實淨土指南修淨業者必不可少楚石禪師道高德備朝朝十念尚無虧焉禮想入觀二儀從時公行儀中摘出專修之士尤為急要修此者不觀境而淨境宛然不參心而真心全露可謂見佛之奇勳明心之妙訣也四十八願九品觀章乃法藏之因心彌陀之果德讀此方了彌陀因果始終不捨於我等苦惱眾生而依此持名於念念中必能圓具信願行之三種資糧西歸不遠唯在此矣如上皆諸祖闡揚之旨並非臆說唯願諸見聞皆生決定信勉力共修持同歸彌陀願一生成佛廣度眾生在此一舉不可緩也戀四學人古崑在舜江天台教觀敬然臂香四十八炷供養阿彌陀佛稽首謹序時癸酉冬西歸行儀目次自序慈雲懺主印施彌陀經正信發願偈佛說阿彌陀經往生淨土十念法門佛說阿彌陀經禮想儀附大懺悔文禮四十八願儀臨睡入觀禮誦儀佛說無量壽經四十八願佛說觀無量壽佛經九品觀章佛說阿彌陀經禮想儀䟦西歸行儀目次終
